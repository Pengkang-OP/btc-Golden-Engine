# Performance Benchmark — 自动性能回归检测
# 每次 PR 或 main push 时运行基准测试并与基线对比
# 性能退化 >10% 时生成告警（不阻断 CI）

name: Performance Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark pytest-mock

      - name: Run benchmarks
        id: bench
        run: |
          python -m pytest tests/test_benchmark_regression.py \
            --benchmark-json output.json \
            --benchmark-only \
            -q \
            --tb=short

      - name: Compare with baseline
        id: compare
        run: |
          python << 'PYEOF'
          import json, os

          baseline_path = "tests/benchmark_baseline.json"
          current_path = "output.json"

          # 如果基线文件不存在，跳过比较
          if not os.path.exists(baseline_path):
              print("Baseline not found — skipping comparison")
              # 保存当前结果作为基线草案
              import shutil
              shutil.copy(current_path, baseline_path)
              print(f"Saved current results as initial baseline: {baseline_path}")
              result = "no_baseline"
          else:
              with open(baseline_path) as f:
                  baseline = json.load(f)
              with open(current_path) as f:
                  current = json.load(f)

              # 构建测试名 → 数据的查找映射
              b_benchmarks = baseline.get("benchmarks", [])
              c_benchmarks = current.get("benchmarks", [])
              if not b_benchmarks or not c_benchmarks:
                  print("ERROR: benchmarks key missing from baseline or current JSON")
                  result = "invalid"
              else:
                  bmap = {b["name"]: b["stats"] for b in b_benchmarks}
                  cmap = {c["name"]: c["stats"] for c in c_benchmarks}

                  failed = []
                  report_lines = [
                      "## 性能基准回归报告",
                      "",
                      "| 测试 | 基线 (ops/s) | 当前 (ops/s) | 变化 | 状态 |",
                      "|------|-------------|-------------|------|------|",
                  ]

                  for test_name, c_stats in cmap.items():
                      b_stats = bmap.get(test_name)
                      if not b_stats:
                          continue

                      b_ops = 1.0 / b_stats["mean"] if b_stats["mean"] > 0 else 0
                      c_ops = 1.0 / c_stats["mean"] if c_stats["mean"] > 0 else 0
                      change_pct = ((c_ops - b_ops) / b_ops) * 100 if b_ops > 0 else 0

                      status = "✅" if change_pct > -10 else "❌"
                      if change_pct < -10:
                          failed.append(test_name)

                      report_lines.append(
                          f"| {test_name} | {b_ops:,.0f} | {c_ops:,.0f} | {change_pct:+.1f}% | {status} |"
                      )

                  report = "\n".join(report_lines)
                  print(report)

                  # 输出到 GitHub Step Summary
                  summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
                  if summary_path:
                      with open(summary_path, "a") as f:
                          f.write(report)

                  if failed:
                      result = "regression"
                      print(f"REGRESSION_TESTS={','.join(failed)}")
                      print(f"::warning ::性能退化检测到: {', '.join(failed)}")
                  else:
                      result = "ok"

          # 设置 step output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"result={result}\n")
          PYEOF

      # 如果是 PR，发布性能报告注释
      - name: Comment PR
        if: github.event_name == 'pull_request' && steps.compare.outputs.result != 'no_baseline'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(
              process.env.GITHUB_STEP_SUMMARY,
              'utf8'
            );
            if (body.includes('性能基准回归报告')) {
              const { data } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: output.json
          retention-days: 30

  # 在 main 分支合并后自动更新基线
  update-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .

      - name: Update baseline
        run: |
          if [ -f output.json ]; then
            cp output.json tests/benchmark_baseline.json
            echo "Baseline updated from main branch run"
          fi

      - name: Commit baseline update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/benchmark_baseline.json
          git diff --staged --quiet || git commit -m "chore(benchmark): auto-update baseline [skip ci]"
          git push
