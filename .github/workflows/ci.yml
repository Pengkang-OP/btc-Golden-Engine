# Bitcoin Collision Engine — CI/CD 工作流
# 每次 Push 或 PR 提交时自动执行

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12.10"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 使用与 pre-commit 一致的版本
          pip install "ruff==0.9.7" "mypy==1.15.0"

      - name: Lint check (ruff)
        run: ruff check . --exclude .github --exclude __pycache__

      - name: Format check (ruff)
        run: ruff format --check . --exclude .github --exclude __pycache__

      - name: Type check (mypy) — 全项目
        run: |
          python --version
          mypy --version
          mypy __main__.py collision_engine.py collision_target.py \
            extract_utxo_hash160.py extract_utxo_xonly.py \
            core/ api/ gpu_engine/ distributed/ tests/ \
            --ignore-missing-imports --platform linux --show-error-codes \
            > mypy_output.txt 2>&1; rc=$?
          cat mypy_output.txt
          exit $rc

      - name: Upload mypy output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-output
          path: mypy_output.txt
          retention-days: 7

  # ── 多平台测试 ──────────────────────────────────────────────
  python-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ matrix.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock httpx pytest-cov

      - name: Generate test vectors
        run: python gpu_engine/test_vectors.py

      - name: Run kernel verification tests (no GPU)
        # 注意: 不要用 -k "not gpu" 过滤, 因为 gpu_engine 包名含 "gpu"
        # 所有测试都会因包名匹配而排除。改用 skipif 标记自动跳过。
        run: pytest gpu_engine/test_kernel_compile.py -v --tb=short

      - name: Run core module tests
        # 说明: --ignore 排除基准回归测试（由 benchmark.yml 单独处理）
        #       distributed/test_distributed.py 在 tests/ 外，须显式添加
        #       test_e2e_collision.py 已验证本地通过，取消 CI 排除以验证
        #       注意: 使用单行避免 YAML 标量折叠 + shell 续接符兼容性问题
        run: pytest tests/ distributed/test_distributed.py -v --tb=short -x --ignore=tests/test_benchmark_regression.py --cov=collision_engine --cov=collision_target --cov=core --cov=api --cov=gpu_engine --cov=distributed --cov-report=xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
          if-no-files-found: warn

  # ── 安全扫描 ────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Scan for known vulnerabilities (pip-audit)
        # pip-audit 直接解析 requirements.txt，无需预先安装所有依赖
        run: python -m pip_audit --strict -r requirements.txt

  # ── CD: Docker 镜像构建 & 推送 ────────────────────────────────
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, python-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — verify image starts and exits cleanly
        run: |
          IMAGE="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$IMAGE" | head -1)
          docker run --rm "$FIRST_TAG" --help 2>&1 | head -5
          echo "Docker smoke test passed"

  # ── GPU 烟雾测试（可选，跳过不影响 CI 状态） ────────────────
  gpu-smoke-test:
    runs-on: ubuntu-latest
    needs: [lint, python-test]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install OpenCL runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev clinfo || echo "OpenCL runtime not available"
          clinfo 2>/dev/null && echo "OpenCL available" || echo "No OpenCL device"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyopencl 2>/dev/null || echo "pyopencl not installable"

      - name: Run GPU kernel compilation test
        run: |
          pytest gpu_engine/test_kernel_compile.py -v --tb=short \
            -k "test_gpu_compile_kernel or test_gpu_device_discovery" \
            -W ignore::pytest.PytestUnknownMarkWarning
