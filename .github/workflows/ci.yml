# Bitcoin Collision Engine — CI/CD 工作流
# 每次 Push 或 PR 提交时自动执行

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint check (ruff)
        run: ruff check . --exclude .github --exclude __pycache__

      - name: Format check (ruff)
        run: ruff format --check . --exclude .github --exclude __pycache__

      - name: Type check (mypy) — 全项目
        run: |
          mypy collision_engine.py collision_target.py extract_utxo_hash160.py \
            extract_utxo_xonly.py core/ api/ gpu_engine/ \
            --ignore-missing-imports --platform linux

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock httpx

      - name: Generate test vectors
        run: python gpu_engine/test_vectors.py

      - name: Run kernel verification tests (no GPU)
        run: pytest gpu_engine/test_kernel_compile.py -v --tb=short -k "not gpu"

      - name: Run core module tests
        run: pytest tests/ -v --tb=short -x

  # ── CD: Docker 镜像构建 & 推送 ────────────────────────────────
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, python-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GPU 烟雾测试（可选，跳过不影响 CI 状态） ────────────────
  gpu-smoke-test:
    runs-on: ubuntu-latest
    needs: [lint, python-test]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install OpenCL runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev clinfo || echo "OpenCL runtime not available"
          clinfo 2>/dev/null && echo "OpenCL available" || echo "No OpenCL device"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyopencl 2>/dev/null || echo "pyopencl not installable"

      - name: Run GPU kernel compilation test
        run: |
          pytest gpu_engine/test_kernel_compile.py -v --tb=short \
            -k "test_gpu_compile_kernel or test_gpu_device_discovery" \
            -W ignore::pytest.PytestUnknownMarkWarning
