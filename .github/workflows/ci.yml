# Bitcoin Collision Engine — CI/CD 工作流
# 每次 Push 或 PR 提交时自动执行

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pre-commit

      - name: Lint check (ruff)
        run: ruff check . --exclude .github --exclude __pycache__

      - name: Format check (ruff)
        run: ruff format --check . --exclude .github --exclude __pycache__

      - name: Type check (mypy)
        run: mypy core/ --ignore-missing-imports --platform linux

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Generate test vectors
        run: python gpu_engine/test_vectors.py

      - name: Run kernel verification tests (no GPU required)
        run: pytest gpu_engine/test_kernel_compile.py -v --tb=short -k "not gpu"

      - name: Run core module tests
        run: pytest tests/ -v --tb=short -x

  gpu-smoke-test:
    runs-on: ubuntu-latest
    needs: [lint, python-test]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenCL runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev clinfo || echo "OpenCL runtime not available"
          clinfo 2>/dev/null && echo "OpenCL available" || echo "No OpenCL device"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyopencl 2>/dev/null || echo "pyopencl not installable"

      - name: Run GPU kernel compilation test
        run: |
          # GPU compilation test (skipped if pyopencl unavailable)
          pytest gpu_engine/test_kernel_compile.py -v --tb=short \
            -k "test_gpu_compile_kernel or test_gpu_device_discovery" \
            -W ignore::pytest.PytestUnknownMarkWarning
