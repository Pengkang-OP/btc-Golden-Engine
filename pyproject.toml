[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bitcoin-collision-finder"
version = "2.3.0"
description = "Bitcoin 私钥碰撞检测系统"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
keywords = ["bitcoin", "collision", "private-key", "gpu"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
]

dependencies = [
    "coincurve>=3.0.0",
    "bech32>=1.2.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
gpu = ["pyopencl>=2024.1"]
web = ["fastapi>=0.110.0", "uvicorn>=0.29.0", "jinja2>=3.1.0", "websockets>=12.0"]
dev = [
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "pytest-benchmark>=4.0",
    "httpx>=0.28.0",
]
distributed = [
    "grpcio>=1.60.0",
    "protobuf>=4.25.0",
]
all = [
    "pyopencl>=2024.1",
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "jinja2>=3.1.0",
    "websockets>=12.0",
    "grpcio>=1.60.0",
    "protobuf>=4.25.0",
]

[project.urls]
Homepage = "https://github.com/Pengkang-OP/btc-Golden-Engine"
Repository = "https://github.com/Pengkang-OP/btc-Golden-Engine"
Documentation = "https://github.com/Pengkang-OP/btc-Golden-Engine#readme"
"Bug Tracker" = "https://github.com/Pengkang-OP/btc-Golden-Engine/issues"

[project.scripts]
collision-engine = "collision_engine:main"

[tool.setuptools.packages.find]
include = ["core*", "gpu_engine*", "distributed*"]

[tool.ruff]
exclude = [
    "distributed/protocol_pb2*.py",
    "ruff_check.py",
    "fix_unicode.py",
    "fix_logging.py",
    "_ruff_count.py",
    "_analyze_ruff.py",
    "_analyze_ruff2.py",
    "_fix_ruf.py",
    "_fix_remaining.py",
    "_fix_remaining2.py",
    "_check_suppressed.py",
    "_count_suppressed.py",
    "_remove_exemptions.py",
]

[tool.ruff.lint]
select = ["ANN", "ARG", "B", "BLE", "C", "COM", "D", "E", "EM", "ERA", "F", "FBT", "G", "I", "N", "PERF", "PL", "PTH", "Q", "RUF", "S", "SLF", "T", "TRY", "UP", "W"]
ignore = ["E501", "E402", "D203", "D213", "COM812", "EM101", "TRY003", "RUF001", "RUF002", "RUF003"]

