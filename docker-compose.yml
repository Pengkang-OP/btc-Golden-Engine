services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitcoin-collision-finder:latest
    stdin_open: true
    tty: true
    network_mode: host  # 注意: Docker Desktop (Windows/macOS) 不支持 host 网络模式
    volumes:
      - ./utxo_hash160.bin:/app/utxo_hash160.bin:ro
      - ./utxo_hash160.idx:/app/utxo_hash160.idx:ro
      - ./utxo_xonly.bin:/app/utxo_xonly.bin:ro
      - ./results:/app/results
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - RESULTS_DIR=/app/results
    command: ["--help"]

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitcoin-collision-finder:latest
    # engine 容器启动即退出（仅展示 --help），故 depends_on 无实际意义
    # depends_on:
    #   - engine
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - RESULTS_DIR=/app/results
    restart: unless-stopped
    entrypoint: ["python", "-m", "api.server"]
    command: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
