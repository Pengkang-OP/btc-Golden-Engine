services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitcoin-collision-finder:latest
    stdin_open: true
    tty: true
    ports:
      - "50051:50051"
    volumes:
      - ./utxo_hash160.bin:/app/utxo_hash160.bin:ro
      - ./utxo_hash160.idx:/app/utxo_hash160.idx:ro
      - ./utxo_xonly.bin:/app/utxo_xonly.bin:ro
      - ./results:/app/results
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - RESULTS_DIR=/app/results
    command: ["--gpu", "--gpu-mode", "sequential"]

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitcoin-collision-finder:latest
    depends_on:
      - engine
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - RESULTS_DIR=/app/results
    restart: unless-stopped
    entrypoint: ["python", "-m", "api.server"]
    command: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
